# ---- 七巨头 ----
AAPL = "全球最大消费电子公司，iPhone+Mac+可穿戴硬件+服务生态 | 硬件+软件+服务一体化闭环，iOS 系统锁定用户，App Store 抽成+订阅服务创造经常性收入 | iPhone 硬件销售占收入 50%+，服务收入（App Store/iCloud/Apple Music）占 25% 且持续增长，利润率高"
MSFT = "全球最大软件公司，Windows+Office 办公套件+Azure 云服务+AI Copilot | 企业级 SaaS 订阅+云基础设施服务，通过 Microsoft 365 和 Azure 深度绑定企业客户，转换成本极高 | Azure 云服务占收入 35% 且增速最快，Office 365 订阅费稳定现金流，AI Copilot 增值提价"
GOOGL = "全球最大搜索引擎+数字广告公司，旗下 YouTube+Android+Google Cloud | 搜索引擎广告拍卖竞价模式，YouTube 视频广告+Google Cloud 云服务为第二第三增长曲线 | 谷歌搜索+YouTube 广告占收入 80%，云计算快速增长，Android 免费授权锁住移动生态入口"
AMZN = "全球最大电商+云计算公司 | 电商零售薄利多销跑规模，第三方卖家平台佣金+物流 FBA 服务费，AWS 云服务按用量付费 | AWS 云服务占利润 60%+ 是核心利润引擎，零售业务薄利跑现金流，广告和 Prime 会员订阅贡献增量"
META = "全球最大社交媒体集团，Facebook+Instagram+WhatsApp+Threads | 用户免费使用+精准广告定向投放变现，利用用户数据+AI 推荐算法提高广告转化率 | 数字广告占收入 98%，广告主按展示/点击付费，Reality Labs 烧钱赌元宇宙长期布局"
NVDA = "全球 AI 算力芯片霸主 | 设计 GPU 芯片（不制造，台积电代工），通过 CUDA 软件生态锁定 AI 开发者，数据中心 GPU+游戏 GPU+自动驾驶芯片三线并进 | 数据中心 GPU（H100/B200）卖给云厂商+AI 公司，毛利率 70%+，CUDA 生态形成事实上的行业标准"
TSLA = "全球最大纯电动车企 | 直销模式绕过经销商，自建超级工厂+充电网络，FSD 自动驾驶软件订阅+碳积分出售为辅 | 卖车（Model Y/3 为主力）+自动驾驶软件订阅+能源储能业务，碳积分卖给传统车厂赚额外利润"

# ---- 半导体与AI ----
AVGO = "全球领先芯片设计+基础设施软件公司 | 定制 ASIC 芯片为云计算大客户（Google/ Meta）设计 AI 加速器，网络芯片用于数据中心交换，VMware 虚拟化软件授权 | 芯片设计费+量产后按颗收费，VMware 订阅制转型提高经常性收入占比"
AMD = "CPU+GPU 双线作战的芯片设计公司 | 无晶圆厂模式（台积电代工），PC/服务器 CPU 对标 Intel，数据中心 GPU 追赶 NVIDIA，通过性价比策略抢占市场份额 | 服务器 EPYC CPU+AI Instinct GPU+PC Ryzen+游戏主机定制芯片，数据中心业务增速最快"
