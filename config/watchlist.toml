SNDK = "全球最大闪存存储厂商（原西部数据闪存部门独立） | NAND Flash 闪存芯片+SSD 固态硬盘控制器，消费级+企业级存储产品 | 闪存芯片销售+SSD 控制器授权，数据爆炸和 AI 训练数据存储需求驱动长期增长"
QCOM = "全球最大手机芯片设计公司 | 无晶圆厂模式，骁龙处理器卖给手机厂商+5G 基带专利授权，汽车智能座舱芯片拓展第二曲线 | 芯片销售（手机/汽车/IoT）+专利许可费（按手机售价比例收），专利授权业务利润率高"
